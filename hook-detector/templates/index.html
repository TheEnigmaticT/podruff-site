<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podruff — Live Sidebar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #141416;
            --surface: #1c1c1f;
            --surface-hover: #242428;
            --border: rgba(255,255,255,0.08);
            --text: #e8e4dd;
            --text-secondary: rgba(232,228,221,0.55);
            --text-muted: rgba(232,228,221,0.3);
            --hook: #00665E;
            --hook-bg: rgba(0,102,94,0.12);
            --topic: #D4960A;
            --topic-bg: rgba(212,150,10,0.12);
            --followup: #7C6AEF;
            --followup-bg: rgba(124,106,239,0.12);
            --danger: #EF4444;
            --radius: 6px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .sidebar {
            width: 100%;
            max-width: 380px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* Header */
        .header {
            padding: 14px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-ready { background: var(--topic); }
        .dot-live { background: var(--hook); animation: pulse 2s infinite; }
        .dot-off { background: var(--danger); }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-text {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
        }
        .timer {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* Controls */
        .controls {
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .btn {
            width: 100%;
            padding: 9px 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
        }
        .btn-start { background: var(--hook); color: var(--text); }
        .btn-stop { background: var(--danger); color: #fff; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Filters */
        .filters {
            padding: 8px 16px;
            display: flex;
            gap: 6px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .filter-btn {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.15s ease;
        }
        .filter-btn.active {
            border-color: transparent;
            color: var(--text);
        }
        .filter-btn[data-type="all"].active { background: rgba(255,255,255,0.1); }
        .filter-btn[data-type="hook"].active { background: var(--hook-bg); border-color: var(--hook); color: var(--hook); }
        .filter-btn[data-type="topic"].active { background: var(--topic-bg); border-color: var(--topic); color: var(--topic); }
        .filter-btn[data-type="followup"].active { background: var(--followup-bg); border-color: var(--followup); color: var(--followup); }

        /* Suggestion list */
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.6;
        }

        /* Suggestion card */
        .card {
            margin: 0 10px 6px;
            padding: 12px 14px;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            transition: border-color 0.15s ease;
        }
        .card:hover { border-color: rgba(255,255,255,0.14); }
        .card-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .card-badge {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .badge-hook { background: var(--hook); color: var(--text); }
        .badge-topic { background: var(--topic); color: var(--bg); }
        .badge-followup { background: var(--followup); color: #fff; }
        .card-time {
            font-size: 11px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }
        .card-status {
            margin-left: auto;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .status-used { background: rgba(0,102,94,0.2); color: var(--hook); }
        .status-good { background: rgba(212,150,10,0.2); color: var(--topic); }
        .status-bad { opacity: 0.3; }
        .card-text {
            font-size: 13px;
            line-height: 1.55;
            color: var(--text);
        }
        .card.is-hook .card-text { font-style: italic; }
        .card.is-bad { opacity: 0.3; }

        /* Tag buttons */
        .card-actions {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        .tag-btn {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.12s ease;
        }
        .tag-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
        .tag-btn.active-used { border-color: var(--hook); color: var(--hook); background: var(--hook-bg); }
        .tag-btn.active-good { border-color: var(--topic); color: var(--topic); background: var(--topic-bg); }
        .tag-btn.active-bad { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.1); }

        /* Transcript toggle */
        .transcript-toggle {
            padding: 10px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }
        .transcript-toggle:hover { color: var(--text); }
        .transcript-content {
            display: none;
            padding: 12px 16px;
            background: var(--bg);
            font-size: 12px;
            line-height: 1.6;
            max-height: 240px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .transcript-content.open { display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="header">
            <div class="header-left">
                <span id="statusDot" class="status-dot dot-ready"></span>
                <span id="statusLabel" class="status-text">Ready</span>
            </div>
            <div class="timer" id="timer">00:00:00</div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-start" onclick="startCapture()">Start recording</button>
            <button id="stopBtn" class="btn btn-stop" onclick="stopCapture()" style="display:none;">Stop &amp; save</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-type="all" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" data-type="hook" onclick="setFilter('hook', this)">Hooks</button>
            <button class="filter-btn" data-type="topic" onclick="setFilter('topic', this)">Topics</button>
            <button class="filter-btn" data-type="followup" onclick="setFilter('followup', this)">Follow-ups</button>
        </div>

        <div class="feed" id="feed">
            <div class="empty-state" id="emptyState">
                Suggestions will stream here once<br>recording starts.
            </div>
        </div>

        <div class="transcript-toggle" onclick="toggleTranscript()">
            <span id="transcriptToggleLabel">Show transcript</span>
        </div>
        <div class="transcript-content" id="transcriptContent"></div>
    </div>

    <script>
        let timerInterval = null;
        let startTime = null;
        let eventSource = null;
        let suggestions = []; // local cache
        let activeFilter = 'all';

        // Restore filter from localStorage
        const savedFilter = localStorage.getItem('podruff_filter');
        if (savedFilter) {
            activeFilter = savedFilter;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.type === activeFilter);
            });
        }

        function formatTime(seconds) {
            const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const s = String(Math.floor(seconds % 60)).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function updateTimer() {
            if (startTime) {
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timer').textContent = formatTime(elapsed);
            }
        }

        function setFilter(type, btn) {
            activeFilter = type;
            localStorage.setItem('podruff_filter', type);
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSuggestions();
        }

        async function startCapture() {
            try {
                const resp = await fetch('/api/start', { method: 'POST' });
                if (!resp.ok) {
                    const data = await resp.json();
                    alert('Error: ' + (data.detail || 'Failed to start'));
                    return;
                }
                suggestions = [];
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('statusDot').className = 'status-dot dot-live';
                document.getElementById('statusLabel').textContent = 'Live';
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
                connectSSE();
                startTranscriptPolling();
            } catch (e) {
                alert('Connection error: ' + e.message);
            }
        }

        async function stopCapture() {
            try {
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('statusLabel').textContent = 'Saving...';
                const resp = await fetch('/api/stop', { method: 'POST' });
                const data = await resp.json();
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('stopBtn').style.display = 'none';
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('statusDot').className = 'status-dot dot-ready';
                document.getElementById('statusLabel').textContent = 'Saved';
                clearInterval(timerInterval);
                disconnectSSE();
                stopTranscriptPolling();
                if (data.file) {
                    alert('Saved to: ' + data.file);
                }
            } catch (e) {
                document.getElementById('stopBtn').disabled = false;
                alert('Error stopping: ' + e.message);
            }
        }

        // SSE for real-time suggestion streaming
        function connectSSE() {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/api/stream');

            eventSource.addEventListener('suggestion', function(e) {
                const data = JSON.parse(e.data);
                // Check if we already have this ID (avoid dupes on reconnect)
                if (!suggestions.find(s => s.id === data.id)) {
                    suggestions.push(data);
                    renderSuggestions();
                }
            });

            eventSource.onerror = function() {
                // Auto-reconnect is built into EventSource
                console.log('SSE reconnecting...');
            };
        }

        function disconnectSSE() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
        }

        // Also do an initial fetch to get any suggestions generated before SSE connected
        async function fetchExisting() {
            try {
                const resp = await fetch('/api/suggestions');
                const data = await resp.json();
                suggestions = data;
                renderSuggestions();
            } catch (e) { /* ignore */ }
        }

        // Transcript polling (still poll since transcript is large and SSE isn't ideal for it)
        let transcriptPoll = null;
        function startTranscriptPolling() {
            transcriptPoll = setInterval(async () => {
                try {
                    const resp = await fetch('/api/transcript');
                    const data = await resp.json();
                    document.getElementById('transcriptContent').textContent = data.text || '';
                } catch (e) { /* ignore */ }
            }, 3000);
        }
        function stopTranscriptPolling() {
            if (transcriptPoll) { clearInterval(transcriptPoll); transcriptPoll = null; }
        }

        function renderSuggestions() {
            const feed = document.getElementById('feed');
            const empty = document.getElementById('emptyState');

            const filtered = activeFilter === 'all'
                ? suggestions
                : suggestions.filter(s => s.type === activeFilter);

            if (!filtered.length) {
                empty.style.display = 'block';
                // Keep empty state but don't clear existing cards if just filtering
                if (!suggestions.length) {
                    feed.innerHTML = '';
                    feed.appendChild(empty);
                }
                return;
            }

            empty.style.display = 'none';

            // Reverse chronological
            const sorted = [...filtered].reverse();
            feed.innerHTML = sorted.map(s => {
                const badgeClass = s.type === 'hook' ? 'badge-hook' :
                                   s.type === 'topic' ? 'badge-topic' : 'badge-followup';
                const typeLabel = s.type === 'followup' ? 'Follow-up' :
                                  s.type.charAt(0).toUpperCase() + s.type.slice(1);
                const cardClass = s.type === 'hook' ? 'is-hook' : '';
                const isBad = s.status === 'bad' ? 'is-bad' : '';

                let statusBadge = '';
                if (s.status === 'used') statusBadge = '<span class="card-status status-used">Used</span>';
                else if (s.status === 'good') statusBadge = '<span class="card-status status-good">Good</span>';
                else if (s.status === 'bad') statusBadge = '<span class="card-status status-bad">Bad</span>';

                const usedActive = s.status === 'used' ? 'active-used' : '';
                const goodActive = s.status === 'good' ? 'active-good' : '';
                const badActive = s.status === 'bad' ? 'active-bad' : '';

                return `<div class="card ${cardClass} ${isBad}" data-id="${s.id}">
                    <div class="card-head">
                        <span class="card-badge ${badgeClass}">${typeLabel}</span>
                        <span class="card-time">${s.time}</span>
                        ${statusBadge}
                    </div>
                    <div class="card-text">${s.type === 'hook' ? '"' + escapeHtml(s.text) + '"' : escapeHtml(s.text)}</div>
                    <div class="card-actions">
                        <button class="tag-btn ${usedActive}" onclick="tagSuggestion('${s.id}', 'used')">Used</button>
                        <button class="tag-btn ${goodActive}" onclick="tagSuggestion('${s.id}', 'good')">Good</button>
                        <button class="tag-btn ${badActive}" onclick="tagSuggestion('${s.id}', 'bad')">Bad</button>
                    </div>
                </div>`;
            }).join('');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function tagSuggestion(id, status) {
            try {
                const resp = await fetch(`/api/suggestions/${id}/tag`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status }),
                });
                if (resp.ok) {
                    // Update local cache
                    const s = suggestions.find(s => s.id === id);
                    if (s) {
                        // Toggle: if already this status, reset to new
                        s.status = s.status === status ? 'new' : status;
                    }
                    renderSuggestions();
                }
            } catch (e) {
                console.error('Tag error:', e);
            }
        }

        function toggleTranscript() {
            const el = document.getElementById('transcriptContent');
            const label = document.getElementById('transcriptToggleLabel');
            el.classList.toggle('open');
            label.textContent = el.classList.contains('open') ? 'Hide transcript' : 'Show transcript';
        }

        // Check initial status on load
        fetch('/api/status').then(r => r.json()).then(status => {
            if (status.recording) {
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('statusDot').className = 'status-dot dot-live';
                document.getElementById('statusLabel').textContent = 'Live';
                startTime = Date.now() - (status.elapsed_seconds * 1000);
                timerInterval = setInterval(updateTimer, 1000);
                fetchExisting();
                connectSSE();
                startTranscriptPolling();
            }
        }).catch(() => {});
    </script>
</body>
</html>
