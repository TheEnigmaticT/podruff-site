# HeyGen Pipeline Configuration
# Copy this file to config.yaml and fill in your values

# HeyGen API Settings
heygen:
  api_key_path: ~/.config/heygen/api_key
  base_url: https://api.heygen.com
  api_version: v2
  
# Default Settings
defaults:
  # Default avatar ID (find yours at https://app.heygen.com/avatars)
  avatar_id: "your-default-avatar-id"
  # Default voice ID (find yours at https://app.heygen.com/voices)
  voice_id: "your-default-voice-id"
  # Video quality: "high", "medium", "low"
  quality: "high"
  # Default video dimensions
  width: 1920
  height: 1080
  
# Language Settings
languages:
  supported:
    - code: "en"
      name: "English"
      default_voice: "en-US-Standard"
      default_avatar: null
    - code: "es"
      name: "Spanish"
      default_voice: "es-ES-Standard"
      default_avatar: null
    - code: "fr"
      name: "French"
      default_voice: "fr-FR-Standard"
      default_avatar: null
    - code: "de"
      name: "German"
      default_voice: "de-DE-Standard"
      default_avatar: null
    - code: "pt"
      name: "Portuguese"
      default_voice: "pt-BR-Standard"
      default_avatar: null
    - code: "ja"
      name: "Japanese"
      default_voice: "ja-JP-Standard"
      default_avatar: null
    - code: "zh"
      name: "Chinese"
      default_voice: "zh-CN-Standard"
      default_avatar: null

# Storage Settings
storage:
  # Local video storage directory
  video_dir: ./videos
  # Metadata storage directory
  metadata_dir: ./metadata
  # Max videos to keep locally (0 = unlimited)
  max_local_videos: 100
  
# Queue Settings
queue:
  # Max concurrent jobs
  concurrency: 2
  # Retry attempts for failed jobs
  max_retries: 3
  # Retry delay in seconds
  retry_delay: 30

# Client Configurations
clients:
  crowdtamers:
    name: "CrowdTamers"
    default_avatar: "Daisy-SitCasual-20241210"
    default_voice: "en-US-JennyNeural"
    brand_colors:
      primary: "#FF6B35"
      secondary: "#004E89"
    
  # Add client-specific configs here
